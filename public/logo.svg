<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Guitar neck (fretboard) -->
  <rect x="20" y="8" width="24" height="48" rx="3" fill="#2c2c2c"/>
  <!-- Frets -->
  <line x1="20" y1="18" x2="44" y2="18" stroke="#888" stroke-width="1.5"/>
  <line x1="20" y1="28" x2="44" y2="28" stroke="#888" stroke-width="1.5"/>
  <line x1="20" y1="38" x2="44" y2="38" stroke="#888" stroke-width="1.5"/>
  <line x1="20" y1="48" x2="44" y2="48" stroke="#888" stroke-width="1.5"/>
  <!-- Strings -->
  <line x1="24" y1="8" x2="24" y2="56" stroke="#ccc" stroke-width="0.8"/>
  <line x1="28" y1="8" x2="28" y2="56" stroke="#ccc" stroke-width="0.8"/>
  <line x1="32" y1="8" x2="32" y2="56" stroke="#ccc" stroke-width="0.8"/>
  <line x1="36" y1="8" x2="36" y2="56" stroke="#ccc" stroke-width="0.8"/>
  <line x1="40" y1="8" x2="40" y2="56" stroke="#ccc" stroke-width="0.8"/>
  <!-- Nut -->
  <rect x="20" y="8" width="24" height="2.5" rx="1" fill="#e0d6c2"/>
  <!-- Finger dots (chord shape) -->
  <circle cx="28" cy="23" r="3" fill="#4a9eff"/>
  <circle cx="32" cy="23" r="3" fill="#4a9eff"/>
  <circle cx="36" cy="13" r="3" fill="#4a9eff"/>
</svg>
