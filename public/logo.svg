    <path d="M18.556,34.717C18.556,37.044 17.408,38.208 15.113,38.208L3.394,38.208C1.132,38.208 0.001,37.044 0.001,34.717L0.001,25.903L5.616,25.903L5.616,33.301L12.965,33.301L12.965,23.706L5.958,18.896L5.958,17.7L12.965,12.964L12.965,4.907L5.616,4.907L5.616,11.865L0.001,11.865L0.001,3.516C0.001,1.172 1.157,0 3.468,0L15.113,0C17.408,0 18.556,1.172 18.556,3.516L18.556,12.5C18.556,14.014 17.921,15.186 16.651,16.016L13.111,18.311L16.7,20.557C17.937,21.322 18.556,22.469 18.556,23.999L18.556,34.717Z" fill="#aaa"/>
